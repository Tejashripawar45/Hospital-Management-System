service: hms-email-service
frameworkVersion: '3'

provider:
  name: aws
  runtime: python3.11
  region: us-east-1

plugins:
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 3000

functions:
  send_email:
    handler: handler.send_email
    events:
      - http:
          path: send-email
          method: post
