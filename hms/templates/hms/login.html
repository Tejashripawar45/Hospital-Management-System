{% extends 'hms/base.html' %}

{% block title %}Login{% endblock %}

{% block extra_head %}
<style>
    .auth-wrapper {
        max-width: 450px;
        margin: 4rem auto;
    }
    .auth-title {
        font-family: var(--font-heading);
        font-size: 2rem;
        font-weight: 700;
        text-align: center;
        margin-bottom: 0.5rem;
    }
    .auth-subtitle {
        color: var(--text-secondary);
        text-align: center;
        font-size: 0.9rem;
        margin-bottom: 2rem;
    }
    .auth-footer {
        margin-top: 1.5rem;
        text-align: center;
        font-size: 0.9rem;
        color: var(--text-secondary);
    }
    .auth-footer a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 500;
        transition: var(--transition);
    }
    .auth-footer a:hover {
        color: var(--primary-hover);
        text-decoration: underline;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="card">
        <h2 class="auth-title">Welcome Back</h2>
        <p class="auth-subtitle">Sign in to manage your appointments and availability</p>

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Enter your username" required autofocus>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.8rem;">
                🔑 Sign In
            </button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="{% url 'signup' %}">Create one here</a>
        </div>
    </div>
</div>
{% endblock %}
